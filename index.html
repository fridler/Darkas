<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דרכ"ש 7114</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">

  <div class="main-container col-12 col-lg-10">
    <h1 class="text-center mb-4">דרכ"ש 7114</h1>

	<!-- רבשצים -->
    <button class="collapsible-toggle mb-3" data-list="ravshatzim" onclick="toggleCollapsible(this)">
      <h3 class="mb-0 d-inline">רבשצים</h3>
      <i class="fas fa-chevron-down toggle-icon ms-2"></i>
    </button>
    <div id="ravshatzim" class="collapsible mb-4 collapsed"></div>

    <!-- חמלים איסוף -->
    <button class="collapsible-toggle mb-3" data-list="hamalIsuf" onclick="toggleCollapsible(this)">
      <h3 class="mb-0 d-inline">חמלים איסוף</h3>
      <i class="fas fa-chevron-down toggle-icon ms-2"></i>
    </button>
    <div id="hamalIsuf" class="collapsible mb-4 collapsed"></div>

    <!-- חמלים ישובים -->

    <!-- חטיבה -->

      <i class="fas fa-chevron-down toggle-icon ms-2"></i>
    </button>
    <div id="hativa" class="collapsible mb-4 collapsed"></div>

    <!-- חמל גדוד+פלוגות -->
    <button class="collapsible-toggle mb-3" data-list="hamalGdod" onclick="toggleCollapsible(this)">
      <h3 class="mb-0 d-inline">חמל גדוד+פלוגות</h3>
      <i class="fas fa-chevron-down toggle-icon ms-2"></i>
    </button>
    <div id="hamalGdod" class="collapsible mb-4 collapsed"></div>

    <!-- קודקודים -->

    </button>

      <i class="fas fa-chevron-down toggle-icon ms-2"></i>
    </button>
    <div id="baliTafkidimPhones" class="collapsible mb-4 collapsed"></div>

    <div id="errorMessage" class="alert alert-danger d-none mb-3" role="alert">
      שגיאה בטעינת הנתונים. אנא ודא שה-URL של Google Apps Script תקין.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
